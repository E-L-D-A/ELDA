        p.style.removeProperty("--hop");
        p.setAttribute(
          "marker-end",
          `url(#m-${[...p.classList].find((c) => c !== "edge")})`,
        );
      }
      for (const el of chips.values()) {
        el.classList.remove("dim", "rel-out", "rel-in", "pinned", "cycle-member");
        el.style.removeProperty("--hop");
      }
    }

    function applyPin() {
      if (pinnedCycle !== null) {
        const cycle = data.cycles.find((c) => cycleId(c) === pinnedCycle);
        if (cycle) {
          focusCycle(cycle);
          return;
        }
        pinnedCycle = null;
      }
      if (pinnedPath === null) {
        blur();
        return;
      }
      const f = data.files.find((f) => f.path === pinnedPath);
      if (!f || !chips.has(f.id)) {
        pinnedPath = null;
        blur();
        return;
      }
      focus(f.id);
      chips.get(f.id).classList.add("pinned");
    }

    // ---------------------------------------------------------------------------
    // Interactions: delegated hover and pinning, grab panning, the tooltip.

    // Chip and edge pointer work arrives by delegation on the board, so a render rebinds nothing.
    // The over/out pair also fires for child-to-child moves inside one chip, and relatedTarget filters those out.
    wrap.addEventListener("pointerover", (e) => {
      if (e.target.classList.contains("hit")) {
        showTip(e, edgeTip(drawn[Number(e.target.dataset.i)]));
        return;
      }
      const chip = e.target.closest(".chip");
      if (!chip || chip.contains(e.relatedTarget)) return;
      const f = data.files[Number(chip.dataset.id)];
      if (chip.classList.contains("ghost")) {
        showTip(e, `${f.path}\nhidden - click to restore`);
        return;
      }
      // Under a reach walk the counts are the point of the hover: how much this file pulls in, and how much breaks when it changes.
      const { out, inc, deep } = focus(f.id);
      showTip(
        e,
        deep
          ? `${f.path}\ndepends on ${out.size} · depended on by ${inc.size}`
          : f.path,
      );
    });
    wrap.addEventListener("pointerout", (e) => {
      if (e.target.classList.contains("hit")) {
        hideTip();
        return;
      }
      const chip = e.target.closest(".chip");
      if (!chip || chip.contains(e.relatedTarget)) return;
      blur(pinnedPath === null && pinnedCycle === null, true);
      hideTip();
    });
    wrap.addEventListener("pointermove", (e) => {
      if (tooltip.style.display === "block") moveTip(e);
    });
    wrap.addEventListener("click", (e) => {
      const chip = e.target.closest(".chip");
      if (!chip) return;
      e.stopPropagation();
      const f = data.files[Number(chip.dataset.id)];
      if (chip.classList.contains("ghost")) {
        hiddenFiles.delete(f.path);
        hideTip();
        render();
        return;
      }
      if (e.ctrlKey || e.altKey) {
        window.location.href = getEditorLink(f.path);
      }
      pinnedCycle = null;
      pinnedPath = pinnedPath === f.path ? null : f.path;
      render();
    });
    // A file joins the hidden shelf with its pin cleared when it was the pinned one.
    function banish(f) {
      hiddenFiles.add(f.path);
      if (pinnedPath === f.path) pinnedPath = null;
    }

    // Middle-click banishes a domain file to its domain's hidden shelf, taking every edge that touches it along; the shelf chip's ordinary click brings it back.
    // On a subdomain or column head, the same click banishes every file the head spans.
    wrap.addEventListener("auxclick", (e) => {
      if (e.button !== 1) return;
      const head = e.target.closest(".grouphead, .colhead");
      const chip = e.target.closest(".chip");
      if (!head && !chip) return;
      e.preventDefault();
      if (head) {
        const { domain, sub, unit } = head.dataset;
        for (const f of data.files) {
          const p = place(f);
          if (p.area !== "domain" || p.domain !== domain || p.sub !== sub) continue;
          if (unit !== undefined && p.unit !== unit) continue;
          banish(f);
        }
      } else {
        const f = data.files[Number(chip.dataset.id)];
        if (chip.classList.contains("ghost")) hiddenFiles.delete(f.path);
        else {
          if (place(f).area !== "domain") return;
          banish(f);
        }
      }
      hideTip();
      render();
    });
    // Canceling the middle-button pointerdown keeps the browser's autoscroll mode off the hideable targets.
    wrap.addEventListener("pointerdown", (e) => {
      if (e.button === 1 && e.target.closest(".chip, .grouphead, .colhead"))
        e.preventDefault();
    });
    document.body.addEventListener("click", () => {
      if (!suppressClick && (pinnedPath !== null || pinnedCycle !== null)) {
        pinnedPath = null;
        pinnedCycle = null;
        applyPin();
      }
    });

    // Grab panning: dragging the board scrolls the page on both axes, with momentum on release.
    // Interactive elements keep their own pointer behavior, and a drag suppresses the click that would otherwise clear the pin.

    const scroller = document.scrollingElement;
    let pan = null,
      coast = 0,
      suppressClick = false;

    document.addEventListener("pointerdown", (e) => {
      if (
        e.button !== 0 ||
        e.target.closest(
          ".chip, button, input, label, a, header, #issues, #bottombar",
        )
      )
        return;
      cancelAnimationFrame(coast);
      pan = {
        x: e.clientX,
        y: e.clientY,
        vx: 0,
        vy: 0,
        t: performance.now(),
        moved: false,
      };
    });
    addEventListener("pointermove", (e) => {
      if (!pan) return;
      const dx = e.clientX - pan.x,
        dy = e.clientY - pan.y;
      if (!pan.moved && Math.hypot(dx, dy) < 4) return;
      if (!pan.moved) {
        pan.moved = true;
        document.body.classList.add("panning");
      }
      const now = performance.now(),
        dt = Math.max(now - pan.t, 1);
      pan.vx = 0.75 * ((dx / dt) * 16) + 0.25 * pan.vx;
      pan.vy = 0.75 * ((dy / dt) * 16) + 0.25 * pan.vy;
      scroller.scrollLeft -= dx;
      scroller.scrollTop -= dy;
      pan.x = e.clientX;
      pan.y = e.clientY;
      pan.t = now;
    });
    addEventListener("pointerup", () => {
      if (!pan) return;
      const { moved } = pan;
      let { vx, vy } = pan;
      pan = null;
      document.body.classList.remove("panning");
      if (!moved) return;
      suppressClick = true;
      setTimeout(() => {
        suppressClick = false;
      }, 0);
      const step = () => {
        vx *= 0.92;
        vy *= 0.92;
        if (Math.abs(vx) < 0.4 && Math.abs(vy) < 0.4) return;
        scroller.scrollLeft -= vx;
        scroller.scrollTop -= vy;
        coast = requestAnimationFrame(step);
      };
      coast = requestAnimationFrame(step);
    });
    addEventListener("wheel", () => cancelAnimationFrame(coast), { passive: true });

    // The tip content is a plain string for chips and a built element for edges.
    function showTip(ev, content) {
      if (typeof content === "string") tooltip.textContent = content;
      else tooltip.replaceChildren(content);
      tooltip.style.display = "block";
      moveTip(ev);
    }
    function moveTip(ev) {
      const pad = 12;
      tooltip.style.left =
        Math.min(ev.clientX + pad, innerWidth - tooltip.offsetWidth - pad) + "px";
      tooltip.style.top =
        Math.min(ev.clientY + pad, innerHeight - tooltip.offsetHeight - pad) + "px";
    }
    function hideTip() {
      tooltip.style.display = "none";
    }

    // ---------------------------------------------------------------------------
    // Issues drawer: every verdict edge, the laundered flow findings, unresolved specifiers, and files the classifier could not place.

    // A header stat: the count and its label; the severity stats add a dot that takes the severity color while the count is nonzero.
    const stat = (n, label, sev) =>
      h(
        "span",
        { class: "stat" + (sev ? " " + sev : "") },
        sev ? h("i", { class: "dot" }) : null,
        h("b", {}, `${n}`),
        ` ${label}`,
      );

    function renderIssues() {
      const el = $("issues");
      el.replaceChildren(
        h(
          "div",
          { class: "drawer-head" },
          h("span", { class: "drawer-title" }, "Issues"),
          h(
            "button",
            {
              class: "drawer-close",
              title: "close",
              onclick: (ev) => {
                ev.stopPropagation();
                el.classList.remove("open");
              },
            },
            "✕",
          ),
        ),
      );
      const issuesBody = h("div", { class: "drawer-body" });
      el.append(issuesBody);
      const section = (title, items, build) => {
        if (!items.length) return;
        issuesBody.append(
          h("h3", {}, `${title} (${items.length})`),
          ...items.map(build),
        );
      };
      // Clicking a finding reveals the file it names: the chip pins on the diagram and scrolls into view.
      const pinId = (id) => (ev) => {
        ev.stopPropagation();
        pinnedCycle = null;
        pinnedPath = data.files[id].path;
        applyPin();
        chips.get(id)?.scrollIntoView({
          block: "center",
          inline: "center",
          behavior: "smooth",
        });
      };
      const pinFrom = (e) => pinId(e.from);
      // A cycle names no single culprit, so clicking one raises the whole set and scrolls to the first file it encloses.
      const pinCycle = (c) => (ev) => {
        ev.stopPropagation();
        pinnedPath = null;
        pinnedCycle = cycleId(c);
        applyPin();
        chips.get(c.files[0])?.scrollIntoView({
          block: "center",
          inline: "center",
          behavior: "smooth",
        });
      };
      // A finding names a file, and the name is the way into it: the path opens the editor, while the item around it still pins the chip on the diagram.
      // Only the path is the link, so the two actions never compete for the same click.
      const pathLink = (path) =>
        h(
          "a",
          {
            class: "path",
            href: getEditorLink(path),
            onclick: (ev) => ev.stopPropagation(),
          },
          path,
        );
      const verdictItem = (e) =>
        h(
          "div",
          {
            class: "item " + (e.tier === "invariant" ? "violation" : "smell"),
            onclick: pinFrom(e),
          },
          h("div", {}, pathLink(data.files[e.from].path), " → ", h("b", {}, e.spec)),
          h("div", { class: "msg" }, e.verdict),
        );
      section(
        "Violations",
        data.edges.filter((e) => e.tier === "invariant"),
        verdictItem,
      );
      section(
        "Inadvisable (graded smells)",
        data.edges.filter((e) => e.tier === "smell"),
        verdictItem,
      );
      // Findings the per-file rules cannot see: every hop is clean, the landed flow is not.
      section(
        "Laundered through indirection (graph-only)",
        data.flows.filter((f) => f.laundered),
        (f) =>
          h(
            "div",
            {
              class: "item laundered",
              onclick: pinFrom(f),
            },
            h("div", {}, pathLink(data.files[f.from].path), " ⇒ ", pathLink(data.files[f.to].path)),
            h(
              "div",
              { class: "msg" },
              `via ${f.via.map((id) => data.files[id].path).join("\n   via ")}\n${f.verdict}`,
            ),
          ),
      );
      // A cycle of legal references is invisible to every per-file rule, because no file in it is at fault (CHANNEL.5): every file in a cycle reaches every other, so the cycle is what a reviewer adjudicates, naming the settling element that encloses it or breaking the cycle.
      section("Reference cycles (graph-only)", data.cycles, (c) =>
        h(
          "div",
          { class: "item cycle", onclick: pinCycle(c) },
          h(
            "div",
            { class: "files" },
            ...c.files.flatMap((id, i) => [
              i ? " ⇄ " : "",
              pathLink(data.files[id].path),
            ]),
          ),
          h("div", { class: "msg" }, c.verdict),
        ),
      );
      section(
        "Unresolved specifiers",
        data.edges.filter((e) => e.to == null),
        (e) =>
          h(
            "div",
            { class: "unresolved item", onclick: pinFrom(e) },
            pathLink(data.files[e.from].path),
            " → ",
            h("b", {}, e.spec),
          ),
      );
      // A file no composition root can reach ships to nobody. SURFACE.4 reads that as a review signal - a domain may expose more than its consumers currently require - so it is listed, never scored as a breach.
      const unreached = data.files.filter((f) => f.reachable === false);
      section("Unreachable from any root", unreached, (f) =>
        h(
          "div",
          { class: "unreachable item", onclick: pinId(f.id) },
          pathLink(f.path),
        ),
      );
      section(
        "Unclassified files",
        data.files.filter((f) => place(f).area === "other"),
        (f) =>
          h("div", { class: "item", onclick: pinId(f.id) }, pathLink(f.path)),
      );
      if (issuesBody.childElementCount === 1)
        issuesBody.append(h("div", { class: "drawer-empty" }, "No findings"));
      const bad = data.edges.filter((e) => e.tier === "invariant").length;
      const smell = data.edges.filter((e) => e.tier === "smell").length;
      const laundered = data.flows.filter((f) => f.laundered).length;
      const cycles = data.cycles.length;
      const found = bad + smell + laundered + cycles;
      $("issue-count").textContent = `${found}`;
      $("issue-count").classList.toggle("hot", found > 0);
      $("counts").replaceChildren(
        stat(data.files.length, "files"),
        stat(data.edges.length, "edges"),
        stat(bad, "violations", bad ? "sev-bad" : "sev-zero"),
        stat(laundered, "laundered", laundered ? "sev-laundered" : "sev-zero"),
        stat(cycles, "cycles", cycles ? "sev-cycle" : "sev-zero"),
        stat(smell, "inadvisable", smell ? "sev-smell" : "sev-zero"),
        stat(unreached.length, "unreachable", unreached.length ? "sev-dead" : "sev-zero"),
      );
    }

    $("issues-btn").addEventListener("click", (e) => {
      e.stopPropagation();
      $("issues").classList.toggle("open");
    });
    $("bottombar").addEventListener("click", (e) => e.stopPropagation());

    // ---------------------------------------------------------------------------
    // Boot, toggles, live reload.

    for (const id of TOGGLES)
      $(id).addEventListener("change", () => {
        savePrefs();
        render();
      });

    let resizeTimer = 0;
    addEventListener("resize", () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        drawEdges();
        applyPin();
      }, 120);
    });

    // The composition-root chips are viewport-sticky, so horizontal scrolling moves them relative to the board; re-aim their arrows once per frame, in place.
    let scrollRaf = 0;
    addEventListener(
      "scroll",
      () => {
        if (scrollRaf) return;
        scrollRaf = requestAnimationFrame(() => {
          scrollRaf = 0;
          updateStickyEdges();
        });
      },
      { passive: true },
    );

    async function load() {
      try {
        data = INLINE ?? (await (await fetch("/data.json")).json());
        $("app-name").textContent = data.app;
        document.title = `ELDA · ${data.app}`;
        loadPrefs();
        render();
      } catch (error) {
        if (INLINE) return;
        const dot = $("live").querySelector(".status-dot");
        dot.classList.remove("on");
        dot.classList.add("off");
        dot.setAttribute("title", "Live reload: off");
      }
    }

    if (!INLINE) {
      const es = new EventSource("/events");
      es.onopen = () => {
        if (INLINE) return;
        const dot = $("live").querySelector(".status-dot");
        dot.classList.add("on");
        dot.setAttribute("title", "Live reload: on");
      }
      es.onerror = () => {
        if (INLINE) return;
        const dot = $("live").querySelector(".status-dot");
        dot.classList.remove("on");
        dot.classList.add("off");
        dot.setAttribute("title", "Live reload: off");
      }
      es.onmessage = load;
    }
    await load();

    function getEditorLink(path) {
      return "vscode://file/" + data.cwd + "/" + path;
    }
    </script>
  </body>
</html>
